<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>зӮ№з”өиҚ·з”өеңә - зӯүеҠҝйқўдёҺз”өеңәеҠӣ</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: #16213e;
            --text: #e0e0e0;
            --accent: #ff6b6b;
            --accent2: #4ecdc4;
            --slider-track: #2a2a4a;
            --border: #333355;
            --highlight: #ffd93d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            color: var(--text);
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            gap: 12px;
        }

        .title-area {
            text-align: center;
        }
        .title-area h1 {
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            font-weight: 600;
            letter-spacing: 0.04em;
            color: #fff;
            margin-bottom: 2px;
        }
        .title-area .subtitle {
            font-size: 0.8rem;
            color: #aab;
            letter-spacing: 0.03em;
        }

        .canvas-wrapper {
            position: relative;
            background: #0d0d1a;
            border-radius: 16px;
            border: 2px solid var(--border);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            aspect-ratio: 1.4 / 1;
            max-width: 820px;
            max-height: 580px;
            cursor: default;
            touch-action: none;
        }
        .canvas-wrapper.dragging {
            cursor: grabbing;
        }
        .canvas-wrapper.hovering-q {
            cursor: grab;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            width: 100%;
            max-width: 820px;
            justify-content: center;
            padding: 8px 0;
        }

        .control-group {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 160px;
            flex: 1 1 180px;
            max-width: 260px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }
        .control-group label {
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-group label .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot.red {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444aa;
        }
        .dot.blue {
            background: #4499ff;
            box-shadow: 0 0 10px #4499ffaa;
        }

        .control-group input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--slider-track);
            outline: none;
            cursor: pointer;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s;
        }
        .control-group input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
        .control-group.q-slider input[type="range"]::-webkit-slider-thumb {
            border-color: var(--accent2);
        }

        .value-display {
            font-size: 0.78rem;
            color: #ccc;
            text-align: right;
            font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
            letter-spacing: 0.02em;
        }
        .value-display span {
            color: #fff;
            font-weight: 600;
        }

        .info-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
            max-width: 820px;
            justify-content: center;
            font-size: 0.75rem;
            color: #99a;
            text-align: center;
            padding: 2px 0;
        }
        .info-bar .hint {
            background: var(--panel-bg);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .info-bar .hint em {
            color: #ffd93d;
            font-style: normal;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .controls-panel {
                gap: 8px;
            }
            .control-group {
                padding: 8px 12px;
                min-width: 130px;
                flex: 1 1 140px;
                max-width: 48%;
            }
            .control-group label {
                font-size: 0.75rem;
            }
            .value-display {
                font-size: 0.7rem;
            }
            .info-bar {
                font-size: 0.68rem;
            }
            .canvas-wrapper {
                border-radius: 10px;
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="title-area">
            <h1>вҡЎ зӮ№з”өиҚ·з”өеңә В· зӯүеҠҝйқўдёҺз”өеңәеҠӣ</h1>
            <p class="subtitle">жӢ–еҠЁи“қиүІиҜ•жҺўз”өиҚ· &nbsp;|&nbsp; и°ғиҠӮж»‘еқ—и§ӮеҜҹиҒ”еҠЁеҸҳеҢ–</p>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="mainCanvas"></canvas>
        </div>

        <div class="info-bar">
            <span class="hint">рҹ–ұпёҸ <em>жӢ–еҠЁ</em>и“қиүІе°Ҹзҗғж”№еҸҳи·қзҰ» r</span>
            <span class="hint">рҹ“җ зӯүеҠҝйқў ПҶ = kQ/r</span>
            <span class="hint">вҡЎ E = kQ/rВІ</span>
            <span class="hint">рҹ’Ә F = qE</span>
        </div>

        <div class="controls-panel">
            <div class="control-group" id="qControl">
                <label>
                    <span class="dot red"></span> дёӯеҝғз”өиҚ· Q
                </label>
                <input type="range" id="qSlider" min="1" max="5" step="0.01" value="2.5">
                <div class="value-display">Q = <span id="qValue">2.50</span> Г— 10вҒ»вҒ¶ C</div>
            </div>
            <div class="control-group q-slider" id="tqControl">
                <label>
                    <span class="dot blue"></span> иҜ•жҺўз”өиҚ· q
                </label>
                <input type="range" id="tqSlider" min="1" max="10" step="0.01" value="3">
                <div class="value-display">q = <span id="tqValue">3.00</span> Г— 10вҒ»вҒё C</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const wrapper = document.getElementById('canvasWrapper');

            // --- зү©зҗҶеёёйҮҸ ---
            const k = 8.99e9; // йқҷз”өеҠӣеёёйҮҸ NВ·mВІ/CВІ

            // --- жҜ”дҫӢе°әпјҡ1еғҸзҙ  = 0.002зұі (500px = 1m) ---
            const PX_TO_M = 0.002;
            const M_TO_PX = 1 / PX_TO_M; // 500 px/m

            // --- зҠ¶жҖҒ ---
            let Q_charge = 2.5e-6; // дёӯеҝғз”өиҚ·йҮҸ (C)
            let q_charge = 3e-8; // иҜ•жҺўз”өиҚ·йҮҸ (C)
            let qPosPx = { x: 0, y: 0 }; // иҜ•жҺўз”өиҚ·еңЁcanvasдёҠзҡ„еғҸзҙ еқҗж Ү
            let isDragging = false;
            let isHoveringQ = false;

            // --- Canvas е°әеҜёз®ЎзҗҶ ---
            let canvasW, canvasH; // CSSеғҸзҙ е°әеҜё
            let cx, cy; // дёӯеҝғз”өиҚ·Qзҡ„еғҸзҙ еқҗж ҮпјҲcanvasдёӯеҝғпјү
            let dpr = Math.min(window.devicePixelRatio || 1, 2); // йҷҗеҲ¶еғҸзҙ жҜ”д»ҘжҸҗеҚҮжҖ§иғҪ

            function resizeCanvas() {
                const rect = wrapper.getBoundingClientRect();
                canvasW = rect.width;
                canvasH = rect.height;
                // и®ҫзҪ®е®һйҷ…еғҸзҙ зј“еҶІеҢә
                canvas.width = Math.floor(canvasW * dpr);
                canvas.height = Math.floor(canvasH * dpr);
                canvas.style.width = canvasW + 'px';
                canvas.style.height = canvasH + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                cx = canvasW / 2;
                cy = canvasH / 2;
                // еҲқе§ӢеҢ–иҜ•жҺўз”өиҚ·дҪҚзҪ®
                if (qPosPx.x === 0 && qPosPx.y === 0) {
                    qPosPx.x = cx + 100;
                    qPosPx.y = cy - 50;
                }
                // зЎ®дҝқqеңЁз”»еёғеҶ…
                clampQPosition();
            }

            function clampQPosition() {
                const margin = 25;
                const maxR = Math.min(cx, cy) - margin;
                const dx = qPosPx.x - cx;
                const dy = qPosPx.y - cy;
                const r = Math.sqrt(dx * dx + dy * dy);
                const minR = 28; // жңҖе°Ҹи·қзҰ»пјҲеғҸзҙ пјүпјҢйҒҝе…ҚйҷӨд»Ҙйӣ¶
                if (r < minR && r > 0) {
                    const scale = minR / r;
                    qPosPx.x = cx + dx * scale;
                    qPosPx.y = cy + dy * scale;
                } else if (r > maxR) {
                    const scale = maxR / r;
                    qPosPx.x = cx + dx * scale;
                    qPosPx.y = cy + dy * scale;
                } else if (r < minR && r === 0) {
                    qPosPx.x = cx + minR;
                    qPosPx.y = cy;
                }
                // иҫ№з•ҢиЈҒеүӘ
                qPosPx.x = Math.max(margin, Math.min(canvasW - margin, qPosPx.x));
                qPosPx.y = Math.max(margin, Math.min(canvasH - margin, qPosPx.y));
            }

            // --- з§‘еӯҰи®°ж•°жі•ж јејҸеҢ– ---
            function formatSci(num, sigFigs = 3) {
                if (num === 0) return '0';
                const sign = num < 0 ? '-' : '';
                const abs = Math.abs(num);
                const exp = Math.floor(Math.log10(abs));
                const mantissa = abs / Math.pow(10, exp);
                const mantissaStr = mantissa.toFixed(sigFigs - 1);
                // дҪҝз”ЁUnicodeдёҠж Ү
                const superscripts = {
                    '-': 'вҒ»',
                    '0': 'вҒ°',
                    '1': 'В№',
                    '2': 'ВІ',
                    '3': 'Ві',
                    '4': 'вҒҙ',
                    '5': 'вҒө',
                    '6': 'вҒ¶',
                    '7': 'вҒ·',
                    '8': 'вҒё',
                    '9': 'вҒ№'
                };
                const expStr = String(exp);
                let supExp = '';
                for (const ch of expStr) {
                    supExp += superscripts[ch] || ch;
                }
                return sign + mantissaStr + 'Г—10' + supExp;
            }

            function formatSciShort(num, sigFigs = 2) {
                if (num === 0) return '0';
                const abs = Math.abs(num);
                const exp = Math.floor(Math.log10(abs));
                const mantissa = abs / Math.pow(10, exp);
                const mStr = mantissa.toFixed(sigFigs - 1);
                const superscripts = { '-': 'вҒ»', '0': 'вҒ°', '1': 'В№', '2': 'ВІ', '3': 'Ві', '4': 'вҒҙ', '5': 'вҒө', '6': 'вҒ¶',
                    '7': 'вҒ·', '8': 'вҒё', '9': 'вҒ№' };
                let supExp = '';
                for (const ch of String(exp)) supExp += superscripts[ch] || ch;
                return mStr + 'Г—10' + supExp;
            }

            // --- иҺ·еҸ–qеҲ°Qзҡ„еғҸзҙ и·қзҰ»е’Ңе®һйҷ…и·қзҰ» ---
            function getDistances() {
                const dx = qPosPx.x - cx;
                const dy = qPosPx.y - cy;
                const rPx = Math.sqrt(dx * dx + dy * dy);
                const rM = rPx * PX_TO_M;
                return { dx, dy, rPx, rM };
            }

            // --- зү©зҗҶи®Ўз®— ---
            function calcPhysics(rM) {
                if (rM < 1e-9) rM = 1e-9;
                const phi = k * Q_charge / rM;
                const E = k * Q_charge / (rM * rM);
                const F = q_charge * E;
                return { phi, E, F };
            }

            // --- зӯүеҠҝйқўеңҶзҡ„е®ҡд№үпјҲеғҸзҙ еҚҠеҫ„пјҢиҝ‘еӨ„еҜҶйӣҶпјү ---
            function getEquipotentialRadii() {
                // дҪҝз”ЁйқһзәҝжҖ§еҲҶеёғпјҡиҝ‘еӨ„еҜҶйӣҶпјҢиҝңеӨ„зЁҖз–Ҹ
                const maxR = Math.min(cx, cy) - 8;
                const radii = [];
                // дҪҝз”ЁдәҢж¬ЎеҮҪж•°еҲҶеёғ
                const count = 11;
                for (let i = 0; i < count; i++) {
                    const t = i / (count - 1); // 0еҲ°1
                    const rPx = 22 + t * t * (maxR - 22); // дәҢж¬ЎеҲҶеёғпјҢиҝ‘еӨ„еҜҶйӣҶ
                    radii.push(Math.round(rPx));
                }
                // еҺ»йҮҚе№¶зЎ®дҝқжңҖе°Ҹй—ҙи·қ
                const filtered = [radii[0]];
                for (let i = 1; i < radii.length; i++) {
                    if (radii[i] - filtered[filtered.length - 1] >= 14) {
                        filtered.push(radii[i]);
                    }
                }
                return filtered;
            }

            // --- йўңиүІжҳ е°„пјҡж №жҚ®з”өеҠҝеҖјиҝ”еӣһHSLиүІзӣё ---
            function getColorForPhi(phi, phiMin, phiMax) {
                if (phiMax <= phiMin) return { h: 0, s: 80, l: 55 };
                // еҜ№ж•°жҳ е°„пјҡй«ҳphiвҶ’зәў(0В°)пјҢдҪҺphiвҶ’и“қ(240В°)
                const logPhi = Math.log(phi);
                const logMin = Math.log(phiMin);
                const logMax = Math.log(phiMax);
                let t = (logPhi - logMin) / (logMax - logMin);
                t = Math.max(0, Math.min(1, t));
                const hue = 240 * (1 - t); // t=1(й«ҳphi)вҶ’hue=0(зәў), t=0(дҪҺphi)вҶ’hue=240(и“қ)
                return { h: hue, s: 75, l: 50 };
            }

            // --- з»ҳеҲ¶з®ӯеӨҙ ---
            function drawArrow(fromX, fromY, toX, toY, color, lineWidth, headSize = 10) {
                const dx = toX - fromX;
                const dy = toY - fromY;
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len < 1) return;
                const ux = dx / len;
                const uy = dy / len;

                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.lineWidth = lineWidth;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // з®ӯиә«
                const shaftEndX = toX - ux * headSize * 1.1;
                const shaftEndY = toY - uy * headSize * 1.1;
                ctx.beginPath();
                ctx.moveTo(fromX, fromY);
                ctx.lineTo(shaftEndX, shaftEndY);
                ctx.stroke();

                // з®ӯеӨҙеӨҙйғЁ
                const arrowBaseX = toX - ux * headSize;
                const arrowBaseY = toY - uy * headSize;
                const perpX = -uy;
                const perpY = ux;
                const halfW = headSize * 0.45;
                ctx.beginPath();
                ctx.moveTo(toX, toY);
                ctx.lineTo(arrowBaseX + perpX * halfW, arrowBaseY + perpY * halfW);
                ctx.lineTo(arrowBaseX - perpX * halfW, arrowBaseY - perpY * halfW);
                ctx.closePath();
                ctx.fill();
            }

            // --- дё»жёІжҹ“еҮҪж•° ---
            function render() {
                ctx.clearRect(0, 0, canvasW, canvasH);

                // иғҢжҷҜеҫ®еҰҷзҡ„зҪ‘ж ј
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 0.5;
                const gridSize = 30;
                for (let gx = gridSize; gx < canvasW; gx += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(gx, 0);
                    ctx.lineTo(gx, canvasH);
                    ctx.stroke();
                }
                for (let gy = gridSize; gy < canvasH; gy += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, gy);
                    ctx.lineTo(canvasW, gy);
                    ctx.stroke();
                }

                // и®Ўз®—еҪ“еүҚQдёӢжүҖжңүзӯүеҠҝйқўзҡ„ПҶиҢғеӣҙ
                const eqRadii = getEquipotentialRadii();
                const allPhis = eqRadii.map(rPx => k * Q_charge / (rPx * PX_TO_M));
                const phiMax = Math.max(...allPhis);
                const phiMin = Math.min(...allPhis);

                // з»ҳеҲ¶зӯүеҠҝйқўеҗҢеҝғеңҶ
                for (let i = 0; i < eqRadii.length; i++) {
                    const rPx = eqRadii[i];
                    const rM = rPx * PX_TO_M;
                    const phi = k * Q_charge / rM;
                    const colorInfo = getColorForPhi(phi, phiMin, phiMax);
                    const hslStr = `hsl(${colorInfo.h}, ${colorInfo.s}%, ${colorInfo.l}%)`;
                    const alpha = 0.55 + 0.2 * (1 - i / (eqRadii.length - 1)); // еҶ…еңҲжӣҙдёҚйҖҸжҳҺ

                    // з»ҳеҲ¶иҷҡзәҝеңҶ
                    ctx.setLineDash([6, 8]);
                    ctx.strokeStyle = hslStr.replace(')', `, ${alpha})`).replace('hsl',
                        'hsla');
                    ctx.lineWidth = 1.6;
                    ctx.beginPath();
                    ctx.arc(cx, cy, rPx, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // ж ҮжіЁз”өеҠҝеҖјпјҲеңЁеңҶзҡ„еҸідҫ§пјү
                    const labelX = cx + rPx + 8;
                    const labelY = cy;
                    const phiStr = formatSciShort(phi, 2);
                    ctx.fillStyle = hslStr;
                    ctx.font = `${Math.max(9, 11 - eqRadii.length * 0.3)}px 'Segoe UI','PingFang SC',sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    // иғҢжҷҜ
                    const textWidth = ctx.measureText('ПҶ=' + phiStr + ' V').width;
                    ctx.fillStyle = 'rgba(0,0,0,0.65)';
                    ctx.fillRect(labelX - 3, labelY - 8, textWidth + 8, 16);
                    ctx.fillStyle = hslStr;
                    ctx.fillText('ПҶ=' + phiStr + ' V', labelX, labelY);
                }

                // жңҖеҶ…еңҲй«ҳдә®
                if (eqRadii.length > 0) {
                    const innermostR = eqRadii[0];
                    ctx.setLineDash([]);
                    ctx.strokeStyle = 'rgba(255,200,180,0.7)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(cx, cy, innermostR, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // з»ҳеҲ¶дёӯеҝғз”өиҚ·QпјҲзәўиүІеҸ‘е…үзҗғдҪ“пјү
                const qGlowGrad = ctx.createRadialGradient(cx, cy, 6, cx, cy, 30);
                qGlowGrad.addColorStop(0, 'rgba(255,255,200,0.95)');
                qGlowGrad.addColorStop(0.2, 'rgba(255,120,60,0.7)');
                qGlowGrad.addColorStop(0.5, 'rgba(255,40,30,0.3)');
                qGlowGrad.addColorStop(1, 'rgba(255,20,10,0)');
                ctx.fillStyle = qGlowGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, 30, 0, Math.PI * 2);
                ctx.fill();

                // Qдё»дҪ“
                const qBodyGrad = ctx.createRadialGradient(cx - 4, cy - 4, 3, cx, cy, 14);
                qBodyGrad.addColorStop(0, '#fffef0');
                qBodyGrad.addColorStop(0.35, '#ff9966');
                qBodyGrad.addColorStop(0.7, '#ee3333');
                qBodyGrad.addColorStop(1, '#991111');
                ctx.fillStyle = qBodyGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffccaa';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Qж Үи®°
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 13px "Segoe UI","PingFang SC",sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('QвҒә', cx, cy);

                // --- иҜ•жҺўз”өиҚ·q ---
                const { dx, dy, rPx, rM } = getDistances();
                const physics = calcPhysics(rM);
                const { phi, E, F } = physics;

                // иҜ•жҺўз”өиҚ·е…үжҷ•
                const tqGlowGrad = ctx.createRadialGradient(qPosPx.x, qPosPx.y, 4, qPosPx.x, qPosPx.y, 22);
                tqGlowGrad.addColorStop(0, 'rgba(180,220,255,0.8)');
                tqGlowGrad.addColorStop(0.4, 'rgba(80,160,255,0.45)');
                tqGlowGrad.addColorStop(1, 'rgba(40,100,220,0)');
                ctx.fillStyle = tqGlowGrad;
                ctx.beginPath();
                ctx.arc(qPosPx.x, qPosPx.y, 22, 0, Math.PI * 2);
                ctx.fill();

                // qдё»дҪ“
                const tqBodyGrad = ctx.createRadialGradient(qPosPx.x - 2, qPosPx.y - 2, 2, qPosPx.x, qPosPx.y, 10);
                tqBodyGrad.addColorStop(0, '#e8f4ff');
                tqBodyGrad.addColorStop(0.4, '#55aaff');
                tqBodyGrad.addColorStop(0.8, '#2277dd');
                tqBodyGrad.addColorStop(1, '#114488');
                ctx.fillStyle = tqBodyGrad;
                ctx.beginPath();
                ctx.arc(qPosPx.x, qPosPx.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#aaddff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // qж Үи®°
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px "Segoe UI","PingFang SC",sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('qвҒә', qPosPx.x, qPosPx.y);

                // --- з”өеңәз®ӯеӨҙ EпјҲж©ҷиүІпјү ---
                if (rPx > 1) {
                    const ux = dx / rPx;
                    const uy = dy / rPx;

                    // Eз®ӯеӨҙй•ҝеәҰпјҡеҜ№ж•°жҳ е°„
                    const E_min = 1e4;
                    const E_max = 1.5e7;
                    const E_clamped = Math.max(E_min, Math.min(E_max, E));
                    const logE = Math.log(E_clamped);
                    const logEmin = Math.log(E_min);
                    const logEmax = Math.log(E_max);
                    const eLength = 14 + 155 * (logE - logEmin) / (logEmax - logEmin);
                    const eEndX = qPosPx.x + ux * eLength;
                    const eEndY = qPosPx.y + uy * eLength;

                    drawArrow(qPosPx.x, qPosPx.y, eEndX, eEndY, '#ff9944', 3.5, 11);

                    // Eж ҮжіЁ
                    const labelEx = qPosPx.x + ux * (eLength * 0.55) + (-uy) * 22;
                    const labelEy = qPosPx.y + uy * (eLength * 0.55) + (ux) * 22;
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    const eText = 'E=' + formatSciShort(E, 2) + ' V/m';
                    ctx.font = 'bold 10px "SF Mono","Consolas","PingFang SC",monospace';
                    const eTW = ctx.measureText(eText).width;
                    ctx.fillRect(labelEx - eTW / 2 - 5, labelEy - 7, eTW + 10, 16);
                    ctx.fillStyle = '#ffcc88';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(eText, labelEx, labelEy);
                    // е°Ҹе…¬ејҸж Үзӯҫ
                    const eFormulaY = labelEy + 15;
                    ctx.fillStyle = 'rgba(0,0,0,0.55)';
                    const efText = 'E=kQ/rВІ';
                    const efTW = ctx.measureText(efText).width;
                    ctx.fillRect(labelEx - efTW / 2 - 3, eFormulaY - 6, efTW + 6, 13);
                    ctx.fillStyle = '#ffaa66';
                    ctx.font = '9px "Segoe UI","PingFang SC",sans-serif';
                    ctx.fillText(efText, labelEx, eFormulaY);

                    // --- з”өеңәеҠӣз®ӯеӨҙ FпјҲз»ҝиүІпјү ---
                    const F_min = 1e-4;
                    const F_max = 2;
                    const F_clamped = Math.max(F_min, Math.min(F_max, F));
                    const logF = Math.log(F_clamped);
                    const logFmin = Math.log(F_min);
                    const logFmax = Math.log(F_max);
                    const fLength = 14 + 155 * (logF - logFmin) / (logFmax - logFmin);
                    const fEndX = qPosPx.x + ux * fLength;
                    const fEndY = qPosPx.y + uy * fLength;

                    drawArrow(qPosPx.x, qPosPx.y, fEndX, fEndY, '#44dd88', 4.5, 13);

                    // Fж ҮжіЁпјҲеҒҸз§»еҲ°еҸҰдёҖдҫ§пјү
                    const labelFx = qPosPx.x + ux * (fLength * 0.5) + (-uy) * (-20);
                    const labelFy = qPosPx.y + uy * (fLength * 0.5) + (ux) * (-20);
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    const fText = 'F=' + formatSciShort(F, 2) + ' N';
                    ctx.font = 'bold 10px "SF Mono","Consolas","PingFang SC",monospace';
                    const fTW = ctx.measureText(fText).width;
                    ctx.fillRect(labelFx - fTW / 2 - 5, labelFy - 7, fTW + 10, 16);
                    ctx.fillStyle = '#88ffbb';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(fText, labelFx, labelFy);
                    // е°Ҹе…¬ејҸж Үзӯҫ
                    const fFormulaY = labelFy + 15;
                    ctx.fillStyle = 'rgba(0,0,0,0.55)';
                    const ffText = 'F=qE=kQq/rВІ';
                    const ffTW = ctx.measureText(ffText).width;
                    ctx.fillRect(labelFx - ffTW / 2 - 3, fFormulaY - 6, ffTW + 6, 13);
                    ctx.fillStyle = '#66dd99';
                    ctx.font = '9px "Segoe UI","PingFang SC",sans-serif';
                    ctx.fillText(ffText, labelFx, fFormulaY);
                }

                // --- еӣҫдҫӢе’ҢдҝЎжҒҜйқўжқҝ ---
                // е·ҰдёҠи§’еӣҫдҫӢ
                const legendX = 14;
                const legendY = 14;
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(legendX, legendY, 155, 80);
                ctx.fillStyle = '#fff';
                ctx.font = '10px "Segoe UI","PingFang SC",sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText('рҹ”ҙ дёӯеҝғз”өиҚ· QвҒә', legendX + 8, legendY + 6);
                ctx.fillText('рҹ”ө иҜ•жҺўз”өиҚ· qвҒә', legendX + 8, legendY + 22);
                ctx.fillText('рҹҹ  з”өеңәејәеәҰ E', legendX + 8, legendY + 38);
                ctx.fillText('рҹҹў з”өеңәеҠӣ F', legendX + 8, legendY + 54);
                ctx.fillText('вӯ• зӯүеҠҝйқў ПҶ', legendX + 8, legendY + 68);

                // еҸідёӢи§’е®һж—¶ж•°жҚ®йқўжқҝ
                const panelW = 210;
                const panelH = 88;
                const panelX = canvasW - panelW - 12;
                const panelY = canvasH - panelH - 12;
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.roundRect(panelX, panelY, panelW, panelH, 8);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px "SF Mono","Consolas","PingFang SC",monospace';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                const rCm = (rM * 100).toFixed(1);
                ctx.fillText(`рҹ“Ҹ r = ${rCm} cm  (${formatSciShort(rM,2)} m)`, panelX + 10, panelY + 8);
                ctx.fillText(`вҡЎ ПҶ = ${formatSciShort(phi,3)} V`, panelX + 10, panelY + 26);
                ctx.fillText(`рҹ”¶ E = ${formatSciShort(E,3)} V/m`, panelX + 10, panelY + 44);
                ctx.fillText(`рҹ’ҡ F = ${formatSciShort(F,3)} N`, panelX + 10, panelY + 62);

                // еә•йғЁдёӯеӨ®жҸҗзӨә
                if (isDragging) {
                    ctx.fillStyle = 'rgba(255,255,200,0.85)';
                    ctx.font = 'bold 12px "PingFang SC","Segoe UI",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('вҶ• жӢ–еҠЁдёӯвҖҰи§ӮеҜҹ EгҖҒFгҖҒПҶ йҡҸ r еҸҳеҢ–', canvasW / 2, canvasH - 14);
                }
            }

            // --- дәӢд»¶еӨ„зҗҶ ---
            function getEventPos(e) {
                const rect = canvas.getBoundingClientRect();
                let clientX, clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else if (e.changedTouches && e.changedTouches.length > 0) {
                    clientX = e.changedTouches[0].clientX;
                    clientY = e.changedTouches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            function isNearQ(pos) {
                const dx = pos.x - qPosPx.x;
                const dy = pos.y - qPosPx.y;
                return Math.sqrt(dx * dx + dy * dy) < 20;
            }

            function onPointerDown(e) {
                const pos = getEventPos(e);
                if (isNearQ(pos)) {
                    isDragging = true;
                    wrapper.classList.add('dragging');
                    wrapper.classList.remove('hovering-q');
                    e.preventDefault();
                    render();
                }
            }

            function onPointerMove(e) {
                const pos = getEventPos(e);
                if (isDragging) {
                    qPosPx.x = pos.x;
                    qPosPx.y = pos.y;
                    clampQPosition();
                    render();
                    e.preventDefault();
                } else {
                    if (isNearQ(pos)) {
                        if (!isHoveringQ) {
                            isHoveringQ = true;
                            wrapper.classList.add('hovering-q');
                        }
                    } else {
                        if (isHoveringQ) {
                            isHoveringQ = false;
                            wrapper.classList.remove('hovering-q');
                        }
                    }
                }
            }

            function onPointerUp(e) {
                if (isDragging) {
                    isDragging = false;
                    wrapper.classList.remove('dragging');
                    render();
                }
            }

            function onPointerLeave(e) {
                if (isDragging) {
                    isDragging = false;
                    wrapper.classList.remove('dragging');
                }
                isHoveringQ = false;
                wrapper.classList.remove('hovering-q');
                render();
            }

            // з»‘е®ҡдәӢд»¶
            canvas.addEventListener('mousedown', onPointerDown);
            canvas.addEventListener('mousemove', onPointerMove);
            canvas.addEventListener('mouseup', onPointerUp);
            canvas.addEventListener('mouseleave', onPointerLeave);
            canvas.addEventListener('touchstart', onPointerDown, { passive: false });
            canvas.addEventListener('touchmove', onPointerMove, { passive: false });
            canvas.addEventListener('touchend', onPointerUp);
            canvas.addEventListener('touchcancel', onPointerLeave);

            // --- ж»‘еқ—дәӢд»¶ ---
            const qSlider = document.getElementById('qSlider');
            const qValueSpan = document.getElementById('qValue');
            const tqSlider = document.getElementById('tqSlider');
            const tqValueSpan = document.getElementById('tqValue');

            qSlider.addEventListener('input', () => {
                Q_charge = parseFloat(qSlider.value) * 1e-6;
                qValueSpan.textContent = (Q_charge * 1e6).toFixed(2);
                render();
            });

            tqSlider.addEventListener('input', () => {
                q_charge = parseFloat(tqSlider.value) * 1e-8;
                tqValueSpan.textContent = (q_charge * 1e8).toFixed(2);
                render();
            });

            // --- зӘ—еҸЈеӨ§е°ҸеҸҳеҢ– ---
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    resizeCanvas();
                    render();
                }, 200);
            });

            // --- й”®зӣҳи°ғиҠӮ ---
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                    e.preventDefault();
                    const newVal = Math.min(5, (Q_charge * 1e6) + 0.1);
                    Q_charge = newVal * 1e-6;
                    qSlider.value = newVal;
                    qValueSpan.textContent = newVal.toFixed(2);
                    render();
                } else if (e.key === 'ArrowLeft' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                    e.preventDefault();
                    const newVal = Math.max(1, (Q_charge * 1e6) - 0.1);
                    Q_charge = newVal * 1e-6;
                    qSlider.value = newVal;
                    qValueSpan.textContent = newVal.toFixed(2);
                    render();
                } else if (e.key === 'ArrowUp' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                    e.preventDefault();
                    const newVal = Math.min(10, (q_charge * 1e8) + 0.1);
                    q_charge = newVal * 1e-8;
                    tqSlider.value = newVal;
                    tqValueSpan.textContent = newVal.toFixed(2);
                    render();
                } else if (e.key === 'ArrowDown' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                    e.preventDefault();
                    const newVal = Math.max(1, (q_charge * 1e8) - 0.1);
                    q_charge = newVal * 1e-8;
                    tqSlider.value = newVal;
                    tqValueSpan.textContent = newVal.toFixed(2);
                    render();
                }
            });

            // --- еҲқе§ӢеҢ– ---
            function init() {
                resizeCanvas();
                // и®ҫзҪ®ж»‘еқ—еҲқе§ӢеҖј
                qSlider.value = Q_charge * 1e6;
                qValueSpan.textContent = (Q_charge * 1e6).toFixed(2);
                tqSlider.value = q_charge * 1e8;
                tqValueSpan.textContent = (q_charge * 1e8).toFixed(2);
                render();
            }

            // жЈҖжҹҘroundRectж”ҜжҢҒ
            if (!ctx.roundRect) {
                ctx.roundRect = function(x, y, w, h, r) {
                    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                    ctx.beginPath();
                    ctx.moveTo(x + r.tl, y);
                    ctx.lineTo(x + w - r.tr, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    ctx.lineTo(x + w, y + h - r.br);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    ctx.lineTo(x + r.bl, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    ctx.lineTo(x, y + r.tl);
                    ctx.quadraticCurveTo(x, y, x + r.tl, y);
                    ctx.closePath();
                };
            }

            init();

            console.log('вҡЎ зӮ№з”өиҚ·з”өеңәеҠЁз”»е·Іе°ұз»Ә');
            console.log('  рҹ–ұпёҸ жӢ–еҠЁи“қиүІиҜ•жҺўз”өиҚ· | рҹҺҡпёҸ и°ғиҠӮж»‘еқ— | вҢЁпёҸ ж–№еҗ‘й”®еҫ®и°ғ');
            console.log('  рҹ“җ ПҶ=kQ/r | вҡЎ E=kQ/rВІ | рҹ’Ә F=qE=kQq/rВІ');
        })();
    </script>
</body>
</html>
